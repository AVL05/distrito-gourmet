services:

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx:/etc/nginx/conf.d
    ports:
      # Puerto alternativo (8001) ya que 80 y 8080 están ocupados
      - "8001:80"
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build: 
      context: ./frontend
    restart: always

  backend:
    build: 
      context: ./backend
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=distrito_gourmet
      - DB_USERNAME=distrito_user
      - DB_PASSWORD=distrito_pass
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: distrito_gourmet
      MYSQL_USER: distrito_user
      MYSQL_PASSWORD: distrito_pass
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
