version: "3.8"

services:

  db:
    image: postgres:15
    container_name: distrito-db
    environment:
      POSTGRES_DB: distrito_gourmet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: distrito-backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env.docker
    depends_on:
      - db
    command: >
      sh -c "
      composer install &&
      php artisan key:generate &&
      php artisan migrate &&
      apache2-foreground
      "

  frontend:
    build: ./frontend
    container_name: distrito-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: >
      sh -c "
      npm install &&
      npm run dev -- --host
      "

volumes:
  pgdata:
