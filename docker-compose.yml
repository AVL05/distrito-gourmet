services:

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build: 
      context: ./frontend
    restart: always

  backend:
    build: 
      context: ./backend
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: distrito
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
